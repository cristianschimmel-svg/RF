name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: RF

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "=== Iniciando deploy de Rosario Finanzas ==="
            cd /opt/rosario-finanzas
            # Clean untracked files that conflict with incoming changes
            git checkout -- . 2>/dev/null || true
            git clean -fd scripts/ 2>/dev/null || true
            ./update.sh
            echo "=== Deploy completado ==="
